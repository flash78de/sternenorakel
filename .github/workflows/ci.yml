name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build-und-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Chromium für E2E-Tests installieren
        run: npx playwright-core install --with-deps chromium
      - name: E2E-Tests
        run: npm test
